<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>For My Favorite Person ❤️</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Poppins,sans-serif;
    }

    body{

      background-color:#fff6f4;

      background-image:

      /* HEARTS */

      radial-gradient(circle at 20px 20px,
      rgba(120,0,0,0.9) 0 6px,
      transparent 7px),

      radial-gradient(circle at 100px 100px,
      rgba(120,0,0,0.9) 0 6px,
      transparent 7px),

      /* ARGYLE DIAMONDS */

      repeating-linear-gradient(
        45deg,
        #7a0000 0px,
        #7a0000 80px,
        #b22222 80px,
        #b22222 160px
      ),

      repeating-linear-gradient(
        -45deg,
        rgba(255,240,235,0.55) 0px,
        rgba(255,240,235,0.55) 80px,
        rgba(255,180,180,0.35) 80px,
        rgba(255,180,180,0.35) 160px
      ),

      /* DASHED SWEATER LINES */

      repeating-linear-gradient(
        45deg,
        transparent 0px,
        transparent 74px,
        rgba(255,255,255,0.6) 74px,
        rgba(255,255,255,0.6) 78px,
        transparent 78px,
        transparent 82px
      ),

      repeating-linear-gradient(
        -45deg,
        transparent 0px,
        transparent 74px,
        rgba(255,255,255,0.6) 74px,
        rgba(255,255,255,0.6) 78px,
        transparent 78px,
        transparent 82px
      );

      background-size:
        120px 120px,
        120px 120px,
        160px 160px,
        160px 160px,
        160px 160px,
        160px 160px;

      animation:bgMove 18s linear infinite;

      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      position:relative;
      padding:20px;

    }

    @keyframes bgMove{

      0%{

        background-position:
          0 0,
          60px 60px,
          0 0,
          0 0,
          0 0,
          0 0;

      }

      100%{

        background-position:
          120px 120px,
          180px 180px,
          160px 0,
          -160px 0,
          160px 160px,
          -160px 160px;

      }

    }

    .floating-hearts span{
      position:absolute;
      bottom:-100px;
      animation:floatUp linear infinite;
      z-index:1;
      opacity:.7;
    }

    .floating-hearts span:nth-child(1){
      left:5%;
      font-size:20px;
      animation-duration:8s;
    }

    .floating-hearts span:nth-child(2){
      left:15%;
      font-size:35px;
      animation-duration:12s;
    }

    .floating-hearts span:nth-child(3){
      left:28%;
      font-size:25px;
      animation-duration:10s;
    }

    .floating-hearts span:nth-child(4){
      left:40%;
      font-size:40px;
      animation-duration:14s;
    }

    .floating-hearts span:nth-child(5){
      left:55%;
      font-size:22px;
      animation-duration:9s;
    }

    .floating-hearts span:nth-child(6){
      left:68%;
      font-size:30px;
      animation-duration:11s;
    }

    .floating-hearts span:nth-child(7){
      left:80%;
      font-size:18px;
      animation-duration:13s;
    }

    .floating-hearts span:nth-child(8){
      left:92%;
      font-size:28px;
      animation-duration:15s;
    }

    @keyframes floatUp{

      0%{
        transform:translateY(0) rotate(0deg);
        opacity:0;
      }

      20%{
        opacity:1;
      }

      100%{
        transform:translateY(-120vh) rotate(360deg);
        opacity:0;
      }

    }

    .card{

      background:rgba(255,255,255,0.92);
      backdrop-filter:blur(8px);

      width:90%;
      max-width:500px;

      padding:40px;

      border-radius:25px;

      text-align:center;

      box-shadow:0 10px 30px rgba(0,0,0,0.2);

      animation:cardFloat 3s ease-in-out infinite;

      z-index:2;
      position:relative;

    }

    .heart{
      font-size:4rem;
      animation:heartbeat 1s infinite;
    }

    h1{
      color:#8b0000;
      margin:15px 0;
      font-size:2.5rem;
    }

    p{
      color:#444;
      line-height:1.8;
      margin-bottom:25px;
      font-size:1.1rem;
    }

    input{

      width:100%;
      padding:14px;

      border:2px solid #8b0000;

      border-radius:15px;

      margin-bottom:20px;

      font-size:1rem;

      outline:none;

      text-align:center;

    }

    button{

      background:#8b0000;

      color:white;

      border:none;

      padding:12px 24px;

      border-radius:30px;

      font-size:1rem;

      cursor:pointer;

      transition:.3s;

    }

    button:hover{

      background:#5c0000;

      transform:scale(1.08);

    }

    #message{

      margin-top:20px;

      font-size:1.1rem;

      color:#8b0000;

      font-weight:bold;

    }

    @keyframes heartbeat{

      0%{
        transform:scale(1);
      }

      25%{
        transform:scale(1.2);
      }

      40%{
        transform:scale(1);
      }

      60%{
        transform:scale(1.15);
      }

      100%{
        transform:scale(1);
      }

    }

    @keyframes cardFloat{

      0%{
        transform:translateY(0);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0);
      }

    }

  </style>
</head>

<body>

  <div class="floating-hearts">
    <span>❤️</span>
    <span>💕</span>
    <span>💖</span>
    <span>💘</span>
    <span>💞</span>
    <span>🩷</span>
    <span>🎀</span>
    <span>🌹</span>
  </div>

  <div class="card">

    <div class="heart">❤️</div>

    <h1>Hey Love!</h1>

    <p>
      Enter your name to continue ❤️
    </p>

    <input
      type="text"
      id="nameInput"
      placeholder="Enter your name"
    >

    <button onclick="checkName()">
      Enter 💌
    </button>

    <div id="message"></div>

  </div>

  <script>

    function checkName(){

      const name = document
        .getElementById("nameInput")
        .value
        .trim()
        .toLowerCase();

      if(
        name === "dwyane" ||
        name === "carlo" ||
        name === "dwyane carlo cabigas"
      ){

        window.location.href = "gallery.html";

      }else{

        document.getElementById("message").innerHTML =
          "ew who are you 😭";

      }

    }

  </script>

</body>
</html>
